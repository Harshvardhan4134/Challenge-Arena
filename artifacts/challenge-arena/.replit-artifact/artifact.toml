kind = "web"
previewPath = "/"
title = "Challenge Arena"
version = "1.0.0"
id = "artifacts/challenge-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25841

[services.development]
run = "pnpm --filter @workspace/challenge-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/challenge-arena", "run", "build" ]
publicDir = "artifacts/challenge-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25841"
BASE_PATH = "/"
